services:
  - type: web
    name: secretaria-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: FRONTEND_URL
        sync: false
